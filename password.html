<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a new password</title>
    <link rel="stylesheet" href="password-style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="FB" class="nav-logo">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search Facebook">
            </div>
        </div>
        <div class="nav-center">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">👥</div>
            <div class="nav-item">📺</div>
            <div class="nav-item">🏪</div>
            <div class="nav-item">🎮</div>
        </div>
        <div class="nav-right">
            <div class="icon-circle">⠿</div>
            <div class="icon-circle">💬</div>
            <div class="icon-circle">🔔</div>
            <div class="profile-nav">
                <img src="https://via.placeholder.com/40" alt="User">
                <span class="arrow-down">▼</span>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="password-card">
            <h1>Create a new password</h1>
            <p class="instruction">You'll use this password to log in to your account. Use at least 6 letters and numbers.</p>

            <div class="user-box">
                <div class="user-avatar-container">
                    <img src="https://via.placeholder.com/60" alt="Profile" class="user-avatar">
                    <div class="fb-badge">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="badge">
                    </div>
                </div>
                <div class="user-details">
                    <span class="user-name">Ifraax Faz</span>
                    <span class="user-sub">Facebook</span>
                </div>
            </div>

            <form id="password-form">
                <input type="password" placeholder="New password" class="password-input" required minlength="6">
                
                <button type="submit" class="btn-continue">Continue</button>
                <button type="button" class="btn-skip">Skip</button>
                
                <label class="checkbox-container">
                    <input type="checkbox">
                    <span class="checkmark"></span>
                    Log out everywhere else to make sure that no one else can still access your account
                </label>
            </form>
        </div>

        <footer class="mini-footer">
            <p>Privacy · Terms · Advertising · Ad choices · Cookies · More</p>
            <p>Meta © 2026</p>
        </footer>
    </div>

    <script src="password-script.js"></script>
</body>
</html>
